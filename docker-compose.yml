version: '3.8'

services:
  users-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fcg-users-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=FCG_Users;User Id=sa;Password=FCG@Pass123!;TrustServerCertificate=True
      - Jwt__Chave=FCG-Fase2-JWT-SharedKey-2026-FIAP!@#$%^&
      - Jwt__Emissor=FCG-UsersAPI
      - Jwt__Audiencia=FCG-Microsservicos
      - Jwt__ExpiracaoHoras=8
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fcg-network
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fcg-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=FCG@Pass123!
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - fcg-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "FCG@Pass123!", "-Q", "SELECT 1", "-b", "-C"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fcg-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - fcg-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  sqlserver-data:
  rabbitmq-data:

networks:
  fcg-network:
    driver: bridge
